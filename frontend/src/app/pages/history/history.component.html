<section class="page">
    <header class="page-header">
        <div>
            <h1>Export History</h1>
            <p class="subtitle">
                View previously exported test scenario files.
            </p>
        </div>
    </header>

    <div class="card">
        <div class="card-body">
            <div *ngIf="!history.length" class="empty-state">
                No exports yet. Generate and export scenarios from the Home page.
            </div>

            <table class="history-table" *ngIf="history.length">
                <thead>
                <tr>
                    <th style="width: 60px;">#</th>
                    <th>File Name</th>
                    <th style="width: 120px;">Jira Ticket</th>
                    <th style="width: 180px;">Created At</th>
                    <th style="width: 120px;">Scenarios</th>
                </tr>
                </thead>
                <tbody>
                <tr *ngFor="let h of history; let i = index">
                    <td>{{ i + 1 }}</td>
                    <td>{{ h.fileName }}</td>
                    <td>{{ h.jiraTicketId }}</td>
                    <td>{{ formatDate(h.createdAt) }}</td>
                    <td>{{ h.scenariosCount }}</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
