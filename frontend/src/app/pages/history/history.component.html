<section class="flex flex-col gap-6">
  <header>
    <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Export History</h1>
    <p class="mt-1 text-sm text-slate-500">
      View previously exported test scenario files.
    </p>
  </header>

  <div class="bg-white rounded-xl shadow-card border border-slate-200 overflow-hidden">
    <div class="p-6">
      <div *ngIf="!history.length" class="py-12 text-center text-slate-500 text-sm">
        No exports yet. Generate and export scenarios from the Home page.
      </div>

      <div *ngIf="history.length" class="overflow-x-auto -mx-6">
        <table class="w-full min-w-[600px] text-sm">
          <thead>
            <tr class="bg-slate-50 border-b border-slate-200">
              <th class="px-4 py-3 text-left font-semibold text-slate-600 text-xs uppercase tracking-wider w-[60px]">#</th>
              <th class="px-4 py-3 text-left font-semibold text-slate-600 text-xs uppercase tracking-wider">File Name</th>
              <th class="px-4 py-3 text-left font-semibold text-slate-600 text-xs uppercase tracking-wider w-[120px]">Source</th>
              <th class="px-4 py-3 text-left font-semibold text-slate-600 text-xs uppercase tracking-wider w-[180px]">Created At</th>
              <th class="px-4 py-3 text-left font-semibold text-slate-600 text-xs uppercase tracking-wider w-[120px]">Scenarios</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let h of history; let i = index" class="border-b border-slate-100 hover:bg-slate-50/50 transition-colors">
              <td class="px-4 py-3 text-slate-600">{{ i + 1 }}</td>
              <td class="px-4 py-3 font-medium text-slate-900">{{ h.fileName }}</td>
              <td class="px-4 py-3 text-slate-600">{{ h.sourceId }}</td>
              <td class="px-4 py-3 text-slate-600">{{ formatDate(h.createdAt) }}</td>
              <td class="px-4 py-3 text-slate-600">{{ h.scenariosCount }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</section>
