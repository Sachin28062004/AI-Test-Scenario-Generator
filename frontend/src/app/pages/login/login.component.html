<section class="flex flex-col gap-6 max-w-md mx-auto min-h-[calc(100vh-3rem)] justify-center py-12">
  <header class="text-center">
    <h1 class="text-2xl font-bold text-slate-900 tracking-tight">
      {{ isLoginMode ? 'Sign In' : 'Create Account' }}
    </h1>
    <p class="mt-2 text-sm text-slate-500">
      {{ isLoginMode ? 'Enter your credentials to continue.' : 'Register to use the AI Test Scenario Generator.' }}
    </p>
  </header>

  <div class="bg-white rounded-xl shadow-card border border-slate-200 overflow-hidden">
    <div class="p-6">
      <form (ngSubmit)="onSubmit()" novalidate class="flex flex-col gap-5">
        <div class="flex flex-col gap-1.5">
          <label for="username" class="text-xs font-semibold text-slate-700 uppercase tracking-wide">Username</label>
          <input
            id="username"
            type="text"
            [(ngModel)]="username"
            name="username"
            placeholder="Enter username"
            required
            class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition-shadow"
          />
        </div>
        <div *ngIf="!isLoginMode" class="flex flex-col gap-1.5">
          <label for="email" class="text-xs font-semibold text-slate-700 uppercase tracking-wide">Email</label>
          <input
            id="email"
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="Enter email"
            class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition-shadow"
          />
        </div>
        <div class="flex flex-col gap-1.5">
          <label for="password" class="text-xs font-semibold text-slate-700 uppercase tracking-wide">Password</label>
          <input
            id="password"
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Enter password"
            required
            class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition-shadow"
          />
        </div>
        <p *ngIf="errorMessage" class="text-sm text-red-600">{{ errorMessage }}</p>
        <button
          type="submit"
          [disabled]="loading || !username || !password"
          class="w-full py-3 bg-primary-600 text-white text-sm font-semibold rounded-lg hover:bg-primary-700 focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 disabled:opacity-60 disabled:cursor-not-allowed transition-colors"
        >
          {{ loading ? 'Please wait...' : (isLoginMode ? 'Sign In' : 'Register') }}
        </button>
        <button
          type="button"
          (click)="toggleMode()"
          class="text-sm text-primary-600 hover:text-primary-700 hover:underline font-medium text-left"
        >
          {{ isLoginMode ? "Don't have an account? Register" : 'Already have an account? Sign In' }}
        </button>
      </form>
    </div>
  </div>
</section>
