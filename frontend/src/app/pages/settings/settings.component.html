<section class="flex flex-col gap-6">
  <header>
    <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Settings</h1>
    <p class="mt-1 text-sm text-slate-500">
      Configure the Grok (xAI) API key used by the AI generator.
    </p>
  </header>

  <div class="bg-white rounded-xl shadow-card border border-slate-200 overflow-hidden">
    <div class="p-6">
      <form (ngSubmit)="onSave()" novalidate class="flex flex-col gap-5 max-w-lg">
        <div class="flex flex-col gap-1.5">
          <label for="grokApiKey" class="text-xs font-semibold text-slate-700 uppercase tracking-wide">Grok (xAI) API Key</label>
          <input
            id="grokApiKey"
            type="password"
            [(ngModel)]="grokApiKey"
            name="grokApiKey"
            placeholder="Your Grok (xAI) API Key"
            class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition-shadow font-mono"
          />
        </div>
        <button
          type="submit"
          class="w-fit px-5 py-2.5 bg-primary-600 text-white text-sm font-semibold rounded-lg hover:bg-primary-700 focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 transition-colors"
        >
          Save Settings
        </button>
        <p *ngIf="errorMessage" class="text-sm text-red-600">{{ errorMessage }}</p>
        <p *ngIf="savedMessage" class="text-sm text-emerald-600 font-medium">{{ savedMessage }}</p>
      </form>
    </div>
  </div>
</section>
