<div class="min-h-screen flex flex-col bg-slate-50">
  <header *ngIf="auth.isLoggedIn" class="h-14 bg-slate-900 text-white flex items-center px-6 justify-between shadow-lg">
    <div class="flex items-center gap-8">
      <div class="flex items-center gap-2">
        <span class="bg-primary-500 px-2.5 py-1 rounded font-semibold text-sm">AI</span>
        <span class="font-medium text-sm tracking-tight">AI Test Scenario Generator</span>
      </div>
      <nav class="flex items-center gap-1">
        <a
          routerLink="/home"
          routerLinkActive="bg-white/20 text-white"
          [routerLinkActiveOptions]="{ exact: true }"
          class="px-3 py-1.5 rounded-md text-slate-300 hover:bg-white/10 hover:text-white transition-colors text-sm font-medium"
        >
          Home
        </a>
        <a
          routerLink="/history"
          routerLinkActive="bg-white/20 text-white"
          class="px-3 py-1.5 rounded-md text-slate-300 hover:bg-white/10 hover:text-white transition-colors text-sm font-medium"
        >
          History
        </a>
        <a
          routerLink="/settings"
          routerLinkActive="bg-white/20 text-white"
          class="px-3 py-1.5 rounded-md text-slate-300 hover:bg-white/10 hover:text-white transition-colors text-sm font-medium"
        >
          Settings
        </a>
      </nav>
    </div>
    <div class="flex items-center gap-3">
      <span class="text-[10px] uppercase tracking-wider bg-white/15 px-2 py-0.5 rounded font-medium">Beta</span>
      <button
        (click)="onLogout()"
        class="px-4 py-2 text-sm font-medium border border-white/30 rounded-lg hover:bg-white/10 transition-colors"
      >
        Logout
      </button>
    </div>
  </header>

  <main class="flex-1 p-6 flex justify-center">
    <div class="w-full max-w-4xl">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
